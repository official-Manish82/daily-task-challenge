name: Daily Auto Commit

on:
  schedule:
    # 8:00 PM IST = 2:30 PM UTC
    - cron: "30 14 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "official-Manish82"
          git config user.email "68983686+official-Manish82@users.noreply.github.com"

      - name: Update README Timestamp
        run: |
          DATE=$(TZ='Asia/Kolkata' date '+%d %B %Y %I:%M:%S %p IST')

          cat > README.md << EOF
          # My GitHub Repository

          ## 🤖 Daily Auto Update

          Last Updated: $DATE

          This repository is automatically updated every day using GitHub Actions.
          EOF

      - name: Commit Changes
        run: |
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🤖 Daily auto update"

      - name: Push Changes
        run: |
          git push
